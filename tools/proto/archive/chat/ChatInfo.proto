syntax = "proto3";
option java_package = "org.generated.protobuf";

message ChatInfo {
    bool is_read = 5;
    uint32 to_uid = 7;
    uint32 sequence = 10;
    uint32 time = 13;
    uint32 uid = 15;

    oneof content {
        string text = 1946;
        uint32 icon = 914;
        SystemHint system_hint = 1753;
    }
    
    message SystemHint {
        uint32 type = 14;
    }
}